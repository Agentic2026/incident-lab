name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.10.9"
      - name: Set up Python
        run: uv python install
      - name: Sync project
        run: uv sync
      - name: Run unit tests
        run: uv run python -m unittest discover -s tests -v
      - name: Smoke-check Dockerfiles
        run: |
          docker build -f docker/simulator.Dockerfile -t incident-lab-simulator:test .
          docker build -f docker/sink.Dockerfile -t incident-lab-sink:test .
